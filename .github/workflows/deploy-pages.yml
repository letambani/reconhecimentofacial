# Gera o build (dist) e envia para a branch gh-pages.
#
# Depois do primeiro deploy: Settings → Pages → Source:
#   "Deploy from a branch" → branch gh-pages → folder / (root)
# (Não use main/(root): isso publica o código-fonte, não o Vite build.)
name: Deploy to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: SPA fallback + desativa Jekyll
        run: cp dist/index.html dist/404.html && touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
